            background: #fde8e8;

            color: #0d4f4f;
            border: 1px solid #0d4f4f;

        var completedTasks = {};
        var sortUnsolvedFirst = false;

        function loadCompletedTasks() {
            try {
                var stored = localStorage.getItem('egeTask4Completed');
                if (stored) { completedTasks = JSON.parse(stored); }
            } catch (e) { completedTasks = {}; }
        }

        function saveCompletedTasks() {
            try { localStorage.setItem('egeTask4Completed', JSON.stringify(completedTasks)); }
            catch (e) {}
        }

        function getUnsolvedCount() {
            var count = 0;
            for (var i = 0; i < tasks.length; i++) {
                if (!completedTasks[tasks[i].id]) { count++; }
            }
            return count;
        }

        function updateCounter() {
            var counter = document.getElementById('unsolvedCounter');
            var unsolved = getUnsolvedCount();
            counter.textContent = 'Не решено: ' + unsolved + ' из ' + tasks.length;
            if (unsolved === 0) {
                counter.style.background = '#e0f0f0';
                counter.style.color = '#0d4f4f';
            } else {
                counter.style.background = '#ffe0e0';
                counter.style.color = '#c0392b';
            }
        }

        function renderTasks() {
            var container = document.getElementById('tasksContainer');
            container.innerHTML = '';

            var displayTasks = tasks.slice();
            if (sortUnsolvedFirst) {
                displayTasks.sort(function(a, b) {
                    var aC = completedTasks[a.id] ? 1 : 0;
                    var bC = completedTasks[b.id] ? 1 : 0;
                    if (aC === bC) return a.id - b.id;
                    return aC - bC;
                });
            }
            for (var i = 0; i < displayTasks.length; i++) {
                var task = displayTasks[i];
                var isCompleted = completedTasks[task.id];

                var block = document.createElement('div');
                block.className = 'task-block';

                var header = document.createElement('div');
                header.className = 'task-header';

                var title = document.createElement('div');
                title.className = 'task-title';
                title.textContent = 'Решите задание';

                var status = document.createElement('div');
                status.className = 'task-status ' + (isCompleted ? 'status-solved' : 'status-pending');
                status.textContent = isCompleted ? 'решено' : 'не решено';

                header.appendChild(title);
                header.appendChild(status);
                block.appendChild(header);

                var text = document.createElement('div');
                text.className = 'task-text';
                text.innerHTML = task.text;
                block.appendChild(text);

                var input = document.createElement('input');
                input.type = 'text';
                input.className = 'answer-input';
                input.placeholder = 'Введите ответ...';
                input.id = 'input-' + task.id;
                input.disabled = isCompleted;
                if (isCompleted) {
                    input.value = task.answer;
                    input.className = 'answer-input correct';
                }
                block.appendChild(input);

                var message = document.createElement('div');
                message.className = 'message';
                message.id = 'message-' + task.id;
                block.appendChild(message);

                var btnContainer = document.createElement('div');
                btnContainer.style.marginTop = '10px';

                var btnCheck = document.createElement('button');
                btnCheck.className = 'btn-check';                btnCheck.textContent = 'Проверить';
                btnCheck.id = 'btn-check-' + task.id;
                btnCheck.disabled = isCompleted;
                btnCheck.onclick = function(taskId) {
                    return function() { checkAnswer(taskId); };
                }(task.id);
                btnContainer.appendChild(btnCheck);

                var btnSolved = document.createElement('button');
                btnSolved.className = 'btn-solved' + (isCompleted ? ' marked' : '');
                btnSolved.textContent = isCompleted ? '✓ решено' : 'решено';
                btnSolved.onclick = function(taskId) {
                    return function() { toggleSolved(taskId); };
                }(task.id);
                btnContainer.appendChild(btnSolved);

                block.appendChild(btnContainer);
                container.appendChild(block);
            }

            updateCounter();
        }

        function checkAnswer(taskId) {
            var task = null;
            for (var i = 0; i < tasks.length; i++) {
                if (tasks[i].id === taskId) { task = tasks[i]; break; }
            }
            if (!task) return;

            var input = document.getElementById('input-' + taskId);
            var message = document.getElementById('message-' + taskId);
            var btnCheck = document.getElementById('btn-check-' + taskId);
            
            var userAnswer = input.value.trim().toLowerCase().replace(/\s/g, '');
            var correctAnswer = task.answer.toLowerCase().replace(/\s/g, '');

            if (!userAnswer) {
                message.textContent = 'Введите ответ!';
                message.className = 'message error show';
                return;
            }

            if (userAnswer === correctAnswer) {
                input.className = 'answer-input correct';
                message.textContent = '✓ Правильно! Задание отмечено как решённое.';
                message.className = 'message success show';
                input.disabled = true;
                btnCheck.disabled = true;
                                if (!completedTasks[taskId]) {
                    completedTasks[taskId] = true;
                    saveCompletedTasks();
                    renderTasks();
                }
            } else {
                input.className = 'answer-input wrong';
                message.textContent = '✗ Неправильно. Попробуйте ещё раз.';
                message.className = 'message error show';
                setTimeout(function() {
                    input.className = 'answer-input';
                    message.classList.remove('show');
                }, 2000);
            }
        }

        function toggleSolved(taskId) {
            if (completedTasks[taskId]) {
                delete completedTasks[taskId];
            } else {
                completedTasks[taskId] = true;
            }
            saveCompletedTasks();
            renderTasks();
        }

        function toggleSort() {
            sortUnsolvedFirst = !sortUnsolvedFirst;
            document.getElementById('sortArrow').textContent = sortUnsolvedFirst ? '↑' : '↓';
            document.getElementById('sortText').textContent = sortUnsolvedFirst ? 'Сначала не решённые' : 'Сортировка';
            renderTasks();
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadCompletedTasks();
            renderTasks();
            
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    var activeInput = document.activeElement;
                    if (activeInput && activeInput.classList.contains('answer-input')) {
                        var taskId = parseInt(activeInput.id.replace('input-', ''));
                        checkAnswer(taskId);
                    }
                }
            });
        });
    </script>
