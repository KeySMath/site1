        var completedTasks = {};
        var sortUnsolvedFirst = false;

        function loadCompletedTasks() {
            try {
                var stored = localStorage.getItem('egeTask15Completed');
                if (stored) { completedTasks = JSON.parse(stored); }
            } catch (e) { completedTasks = {}; }
        }

        function saveCompletedTasks() {
            try { localStorage.setItem('egeTask15Completed', JSON.stringify(completedTasks)); }
            catch (e) {}
        }

        function getUnsolvedCount() {
            var count = 0;
            for (var i = 0; i < tasks.length; i++) {
                if (!completedTasks[tasks[i].id]) { count++; }
            }
            return count;
        }

        function updateCounter() {
            var counter = document.getElementById('unsolvedCounter');            var unsolved = getUnsolvedCount();
            counter.textContent = 'Не решено: ' + unsolved + ' из ' + tasks.length;
            if (unsolved === 0) {
                counter.style.background = '#e0f0f0';
                counter.style.color = '#0d4f4f';
            } else {
                counter.style.background = '#ffe0e0';
                counter.style.color = '#c0392b';
            }
        }

        function formatFractions(text) {
            var result = text;
            
            // 1. Дроби вида (выражение)/(выражение) - со скобками с обеих сторон
            result = result.replace(/\(([^)]+)\)\/\(([^)]+)\)/g, function(match, num, den) {
                return '<span class="frac"><span class="num">(' + num + ')</span><span class="den">(' + den + ')</span></span>';
            });
            
            // 2. Дроби вида число/(выражение) - например 13/(3^x - 81)
            result = result.replace(/(\d+)\/\(([^)]+)\)/g, function(match, num, den) {
                return '<span class="frac"><span class="num">' + num + '</span><span class="den">(' + den + ')</span></span>';
            });
            
            // 3. Дроби вида (выражение)/число
            result = result.replace(/\(([^)]+)\)\/(\d+)/g, function(match, num, den) {
                return '<span class="frac"><span class="num">(' + num + ')</span><span class="den">' + den + '</span></span>';
            });
            
            // 4. Простые дроби число/число - например 1/2, 13/81
            result = result.replace(/(\d+)\/(\d+)/g, function(match, num, den) {
                return '<span class="frac"><span class="num">' + num + '</span><span class="den">' + den + '</span></span>';
            });
            
            return result;
        }

        function renderTasks() {
            var container = document.getElementById('tasksContainer');
            container.innerHTML = '';

            var displayTasks = tasks.slice();
            if (sortUnsolvedFirst) {
                displayTasks.sort(function(a, b) {
                    var aC = completedTasks[a.id] ? 1 : 0;
                    var bC = completedTasks[b.id] ? 1 : 0;
                    if (aC === bC) return a.id - b.id;
                    return aC - bC;
                });
            }
            for (var i = 0; i < displayTasks.length; i++) {
                var task = displayTasks[i];
                var isCompleted = completedTasks[task.id];

                var block = document.createElement('div');
                block.className = 'task-block';

                var header = document.createElement('div');
                header.className = 'task-header';

                var title = document.createElement('div');
                title.className = 'task-title';
                title.textContent = 'Решите задание';

                var status = document.createElement('div');
                status.className = 'task-status ' + (isCompleted ? 'status-solved' : 'status-pending');
                status.textContent = isCompleted ? 'решено' : 'не решено';

                header.appendChild(title);
                header.appendChild(status);
                block.appendChild(header);

                var text = document.createElement('div');
                text.className = 'task-text';
                text.innerHTML = formatFractions(task.text);
                block.appendChild(text);

                var answer = document.createElement('div');
                answer.className = 'answer-text';
                answer.innerHTML = formatFractions(task.answer);
                block.appendChild(answer);

                var btnSolved = document.createElement('button');
                btnSolved.className = 'btn-solved' + (isCompleted ? ' marked' : '');
                btnSolved.textContent = isCompleted ? '✓ решено' : 'решено';
                btnSolved.onclick = function(taskId) {
                    return function() { toggleSolved(taskId); };
                }(task.id);
                block.appendChild(btnSolved);

                container.appendChild(block);
            }

            updateCounter();
        }

        function toggleSolved(taskId) {
            if (completedTasks[taskId]) {
                delete completedTasks[taskId];            } else {
                completedTasks[taskId] = true;
            }
            saveCompletedTasks();
            renderTasks();
        }

        function toggleSort() {
            sortUnsolvedFirst = !sortUnsolvedFirst;
            document.getElementById('sortArrow').textContent = sortUnsolvedFirst ? '↑' : '↓';
            document.getElementById('sortText').textContent = sortUnsolvedFirst ? 'Сначала не решённые' : 'Сортировка';
            renderTasks();
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadCompletedTasks();
            renderTasks();
        });
    </script>
</body>
</html>
